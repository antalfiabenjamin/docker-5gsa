logger:
  file:
    path: /open5gs/install/var/log/open5gs/amf.log
    timestamp: true
  default:
    timestamp: false

global:
  max:
    ue: 1024

amf:
  sbi:
    server:
      - address: fiveg-cn-amf
        port: 7777
    client:
      nrf:
        - uri: http://fiveg-cn-nrf:7777
      scp:
        - uri: http://fiveg-cn-scp:7777
  ngap:
    server:
      - address: 10.200.0.200
      - address: fd00:200::200
  metrics:
    server:
      - address: 0.0.0.0
        port: 9090
  guami:
    - plmn_id:
        mcc: 001
        mnc: 01
      amf_id:
        region: 2
        set: 1
  tai:
    - plmn_id:
        mcc: 001
        mnc: 01
      tac: 1
  plmn_support:
    - plmn_id:
        mcc: 001
        mnc: 01
      s_nssai:
        - sst: 1
  time:
    t3512:
      value: 540
  security:
    integrity_order: [NIA2, NIA1, NIA0]
    ciphering_order: [NEA0, NEA1, NEA2]
  network_name:
    full: Open5GS
    short: O5GS
  amf_name: open5gs-amf0
