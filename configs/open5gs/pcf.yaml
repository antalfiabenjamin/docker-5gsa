db_uri: mongodb://fiveg-cn-db/open5gs
logger:
  file:
    path: /open5gs/install/var/log/open5gs/pcf.log
    timestamp: true
  default:
    timestamp: false

global:
  max:
    ue: 1024

pcf:
  sbi:
    server:
      - address: fiveg-cn-pcf
        port: 7777
    client:
      nrf:
        - uri: http://fiveg-cn-nrf:7777
      scp:
        - uri: http://fiveg-cn-scp:7777
  metrics:
    server:
      - address: 0.0.0.0
        port: 9090
