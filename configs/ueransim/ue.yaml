# IMSI number of the UE (15 digits)
supi: 'imsi-001010000000001'
# Mobile Country Code
mcc: '001'
# Mobile Network Code
mnc: '01'

protectionScheme: 0

# Permanent subscription key
key: '465B5CE8B199B49FAA5F0A2EE238A6BC'
# Operator code (OPc)
op: 'E8ED289DEBA952E4283B54E88E6183CA'
# OP type: OPC
opType: 'OPC'
# Authentication Management Field
amf: '8000'

# IMEI number
imei: '356938035643803'
# IMEISV number
imeiSv: '4370816125816151'

# List of gNB IP addresses for Radio Link Simulation
gnbSearchList:
  - fiveg-ran-gnb

# UAC Access Identities Configuration
uacAic:
  mps: false
  mcs: false

# UAC Access Control Class
uacAcc:
  normalClass: 0
  class11: false
  class12: false
  class13: false
  class14: false
  class15: false

# Initial PDU sessions to be established
sessions:
  - type: 'IPv4'
    apn: 'internet'
    slice:
      sst: 1

# Configured NSSAI
configured-nssai:
  - sst: 1

# Default NSSAI
default-nssai:
  - sst: 1

# Supported integrity algorithms
integrity:
  IA1: true
  IA2: true
  IA3: true

# Supported ciphering algorithms
ciphering:
  EA1: true
  EA2: true
  EA3: true

# Supported encryption algorithms for integrity protection
integrityMaxRate:
  uplink: 'full'
  downlink: 'full'
